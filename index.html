<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IdeaBazaar</title>


<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
}

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
color:#cbd5f5;
}

.search{
margin-top:30px;
}

.search input{
padding:12px;
width:300px;
border-radius:5px;
border:none;
}

.btn{
padding:10px 16px;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}

.ideas{
padding:60px 10%;
}

.grid{
column-count:3;
column-gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
display:inline-block;
width:100%;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card h3{
margin-top:0;
}

.price{
color:#38bdf8;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
background:#020617;
margin-top:40px;
}
.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<nav>

<div class="logo">IdeaBazaar</div>

<ul>
<li><a href="explore.html">Explore</a></li>
<li><a href="sell.html">Sell Idea</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="purchases.html">My Purchases</a></li>
<li><a href="dashboard.html">Dashboard</a></li>

</ul>

</nav>

<section class="hero">

<h1>Buy & Sell Brilliant Ideas</h1>

<p>The marketplace where creators sell innovative ideas.</p>

<div class="search">

<input id="searchInput" placeholder="Search ideas...">
<button class="btn" onclick="searchIdeas()">Search</button>

</div>

</section>

<section class="ideas">

<h2>Trending Ideas</h2>

<div class="grid" id="ideasContainer"></div>

</section>

<footer>

<p>© 2026 IdeaBazaar – Marketplace for Ideas</p>

</footer>

<script>

let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

let container = document.getElementById("ideasContainer");


function viewIdea(idea){

localStorage.setItem("selectedIdea", JSON.stringify(idea));

window.location.href = "idea.html";

}


function buyIdea(idea){

let purchased = JSON.parse(localStorage.getItem("purchasedIdeas")) || [];

purchased.push(idea);

localStorage.setItem("purchasedIdeas", JSON.stringify(purchased));

alert("Idea purchased successfully!");

}


function showIdeas(list){

container.innerHTML="";

list.forEach(function(idea){

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${idea.image}" style="width:100%;border-radius:8px;margin-bottom:10px;">

<h3>${idea.title}</h3>

<p>${idea.desc}</p>

<p>Category: ${idea.category}</p>

<p class="price">₹${idea.price}</p>

<button class="btn" onclick='viewIdea(${JSON.stringify(idea)})'>View</button>

<button class="btn" onclick='buyIdea(${JSON.stringify(idea)})'>Buy</button>

`;
container.appendChild(card);

});

}


showIdeas(ideas);


function searchIdeas(){

let search=document.getElementById("searchInput").value.toLowerCase();

let filtered=ideas.filter(function(idea){

return idea.title.toLowerCase().includes(search);

});

showIdeas(filtered);

}

</script>

</body>
</html>
